<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0A0A0A; padding: 40px 20px; color: #E5E5E5; line-height: 1.6;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #141414; border: 1px solid #333333; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <div style="text-align: center; padding: 30px 20px; border-bottom: 1px solid #333333;">
            <h1 style="margin: 0; color: #FFB703; font-size: 24px; font-weight: bold;">StreamPartner</h1>
        </div>
        <div style="padding: 30px 40px;">
            <p style="font-size: 16px; margin-bottom: 20px;">Bonjour {{ user.first_name|default:"Cher client" }},</p>
            
            <div style="font-size: 16px; margin-bottom: 30px; white-space: pre-line;">
                {{ content }}
            </div>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <a href="{{ dashboard_url }}" style="background-color: #FFB703; color: #000000; font-weight: bold; padding: 14px 28px; border-radius: 8px; text-decoration: none; display: inline-block;">Accéder à mon espace</a>
            </div>
        </div>
        <div style="padding: 20px; text-align: center; border-top: 1px solid #333333; font-size: 12px; color: #666666;">
            &copy; {% now "Y" %} StreamPartner. Tous droits réservés.<br>
            Ceci est un email automatique, merci de ne pas y répondre.
        </div>
    </div>
</div>
